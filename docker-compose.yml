version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: finscope
      POSTGRES_USER: finscope
      POSTGRES_PASSWORD: ${DB_PASSWORD:-finscope_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finscope"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://finscope:${DB_PASSWORD:-finscope_secret}@db:5432/finscope
      SECRET_KEY: ${SECRET_KEY:-change_this_in_production_please}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    volumes:
      - ./backend:/app
      - pdf_storage:/app/pdfs

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - pdf_storage:/pdfs:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  pdf_storage:
